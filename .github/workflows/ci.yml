name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Clojure tools
        uses: DeLaGuardo/setup-clojure@13.5.2
        with:
          cli: latest
          bb: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', 'bb.edn') }}
          restore-keys: |
            clojure-${{ runner.os }}-

      - name: Install Lean
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain stable
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          java -version
          clojure -Sdescribe
          bb --version
          "$HOME/.elan/bin/lean" --version

      - name: Run CI
        run: bb ci

      - name: Validate repo-only cold start
        run: bb validate-cold-start
