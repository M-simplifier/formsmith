name: Rule request
description: Suggest a Clojure idiom or local beauty rewrite for formsmith.
title: "Rule: "
labels: ["rule-request"]
body:
  - type: textarea
    id: before
    attributes:
      label: Before
      description: Show the code shape that feels weak.
      render: clojure
    validations:
      required: true
  - type: textarea
    id: after
    attributes:
      label: Preferred shape
      description: Show the Clojure-like shape you expected.
      render: clojure
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety boundary
      description: Note any side conditions, nil semantics, macro behavior, or cases where this should be suggestion-only.
    validations:
      required: true
  - type: dropdown
    id: context
    attributes:
      label: Context
      options:
        - "CLJ"
        - "CLJS"
        - "Both"
        - "Framework-specific"
    validations:
      required: true
